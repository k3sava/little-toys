</main>

<aside class="wg" id="panel">
  <div class="wg-title" role="button" tabindex="0">Controls</div>
  <div class="wg-body">
    <!-- Shared source picker (image / video). -->
    <div class="wg-row wg-file" data-key="source" data-handler="pix-source">
      <div class="wg-name">Source</div>
      <div class="wg-widget">
        <label class="wg-file-label">click to choose</label>
        <button type="button" class="wg-file-open" title="Open file (image or video)">+</button>
        <button type="button" class="wg-shuffle" title="Cycle bundled sample">↻</button>
        <input type="file" accept="image/*,video/*">
      </div>
    </div>
    <div class="wg-row wg-select" data-key="fit">
      <div class="wg-name">Fit</div>
      <div class="wg-widget">
        <select><option value="cover">cover</option><option value="contain">contain</option></select>
      </div>
    </div>
    <div class="wg-row wg-color" data-key="bg">
      <div class="wg-name">Background</div>
      <div class="wg-widget"><div class="wg-swatch"><input type="color"></div><input type="text" spellcheck="false"></div>
    </div>
    <!-- Stack-specific control rows -->
    <div class="wg-row wg-slider" data-key="canvasSize"     data-min="200" data-max="1600" data-step="10"><div class="wg-name">Canvas size</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-select" data-key="ratio"><div class="wg-name">Ratio</div><div class="wg-widget"><select><option value="9:16">9:16</option><option value="3:4">3:4</option><option value="1:1" selected>1:1</option><option value="16:9">16:9</option></select></div></div>
    <div class="wg-row wg-slider" data-key="cardRadius"     data-min="0"   data-max="250"  data-step="1"><div class="wg-name">Corner radius</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="cardSize"       data-min="40"  data-max="500"  data-step="2"><div class="wg-name">Card size</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="rotationRange"  data-min="0"   data-max="45"   data-step="1"><div class="wg-name">Rotation range</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="rotationSeed"   data-min="0"   data-max="1000" data-step="1"><div class="wg-name">Rotation seed</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="xShiftScale"    data-min="0"   data-max="100"  data-step="1"><div class="wg-name">X shift scale</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="yShiftScale"    data-min="0"   data-max="100"  data-step="1"><div class="wg-name">Y shift scale</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="cycles"         data-min="1"   data-max="4"    data-step="1"><div class="wg-name">Cycles</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-select" data-key="speed"><div class="wg-name">Speed</div><div class="wg-widget"><select><option value="faster">faster</option><option value="linear" selected>linear</option><option value="slower">slower</option></select></div></div>
    <div class="wg-row wg-slider" data-key="durationSeconds" data-min="1"  data-max="60"   data-step="1"><div class="wg-name">Duration</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-color"  data-key="backgroundColor"><div class="wg-name">Background color</div><div class="wg-widget"><div class="wg-swatch"><input type="color"></div><input type="text" spellcheck="false"></div></div>
    <!-- Animation modes — rendered as radio pills by the wg-select pill renderer. -->
    <div class="wg-row wg-select" data-key="mode"><div class="wg-name">Mode</div><div class="wg-widget"><select><option value="deal">deal</option><option value="breath">breath</option><option value="swirl">swirl</option></select></div></div>
    <div class="wg-row wg-bool"   data-key="animate"><div class="wg-name">Animate</div><label class="wg-widget"><input type="checkbox"></label></div>
    <div class="wg-row wg-bool"   data-key="interactive"><div class="wg-name">Interactive</div><label class="wg-widget"><input type="checkbox"></label></div>
    <div class="wg-row wg-bool"   data-key="showEffect"><div class="wg-name">Show effect</div><label class="wg-widget"><input type="checkbox"></label></div>
  </div>
</aside>
